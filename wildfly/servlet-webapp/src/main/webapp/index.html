<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Servlet Web Application</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background-color: #f5f5f5;
        }
        .container {
            background-color: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        h1 {
            color: #333;
            border-bottom: 2px solid #007bff;
            padding-bottom: 10px;
        }
        .links {
            margin-top: 30px;
        }
        .links a {
            display: inline-block;
            padding: 10px 20px;
            margin: 10px 5px;
            background-color: #007bff;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            transition: background-color 0.3s;
        }
        .links a:hover {
            background-color: #0056b3;
        }
        .info {
            background-color: #e9ecef;
            padding: 15px;
            border-radius: 5px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Welcome to Servlet Web Application</h1>
        <p>This is a simple Java Servlet web application running on WildFly 39 with Java 25.</p>

        <div class="info">
            <h3>Application Information</h3>
            <ul>
                <li><strong>Server:</strong> WildFly 39</li>
                <li><strong>Java Version:</strong> 25</li>
                <li><strong>Servlet API:</strong> Jakarta Servlet 6.0</li>
            </ul>
        </div>

        <div class="links">
            <h3>Available Servlets:</h3>
            <a href="hello">Hello Servlet</a>
            <a href="hello?name=Developer">Hello with Parameter</a>
        </div>
    </div>
</body>
</html>
